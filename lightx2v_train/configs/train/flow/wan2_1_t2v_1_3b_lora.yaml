model:
    name: wan_t2v
    pretrained_model_name_or_path: /path/to/Wan2.1-T2V-1.3B
    max_sequence_length: 512
    running_dtype: bf16
    vae_dtype: fp32
    load_vae: true
    load_text_encoder: true
    load_transformer: true

distributed:
    backend: nccl
    timeout_minutes: 60
    fsdp2:
        enabled: true
        reshard_after_forward:
            root_reshard: false
            block_reshard: true
        mixed_precision:
            param_dtype: bf16
            reduce_dtype: fp32
            output_dtype: null
            cast_forward_inputs: false

data:
    train:
        name: wan_t2v_video_dataset
        data_path:
            - /path/to/OpenVid-1M/OpenVid-1M.csv
        video_root: /path/to/OpenVid-1M/video
        video_column: video
        prompt_column: caption
        height: 480
        width: 832
        num_frames: 81
        dataset_repeat: 1
        prompt_dropout_rate: 0.1
        frame_rate: 24
        fix_frame_rate: false
        random_start: false
        skip_missing: true
        decode_retries: 3
        batch_size: 1
        num_workers: 4
        pin_memory: true
        shuffle: true
    val:
        name: prompt_dataset
        data_path:
            - /path/to/wan_t2v_prompts.txt
        max_samples: 5
        batch_size: 1
        num_workers: 0
        shuffle: false

scheduler:
    num_train_timesteps: 1000
    timestep_distribution: logitnormal
    logitnormal_mean: 0.0
    logitnormal_std: 1.0
    min_t: 0.001
    max_t: 1.0
    time_shift_settings:
        do_time_shift: true
        shift_type: exponential
        time_shift_power: 1.0
        dynamic_shift: true
        shift_mu_strategy: wan_video
        base_shift: 3.0
        max_shift: 5.0
        vae_scale_factor_spatial: 8
        base_resolution: [480, 832]
        max_resolution: [720, 1280]

training:
    method: flow
    train_type: lora
    max_train_iters: 3000
    gradient_accumulation_iters: 1
    gradient_checkpointing: true
    max_grad_norm: 1.0
    lr_scheduler: constant
    lr_warmup_iters: 10
    save_every_iters: 100
    save_total_limit: 10
    lora:
        rank: 64
        alpha: 64
        target_modules:
            - q
            - k
            - v
            - o
            - ffn.0
            - ffn.2
    optimizer:
        learning_rate: 0.0001
        adam_beta1: 0.9
        adam_beta2: 0.999
        weight_decay: 0.01
        adam_epsilon: 0.00000001
    output_dir: ./output_train/wan2_1_t2v_1_3b_lora

inference:
    method: wan_t2v_infer
    negative_prompt: "Bright tones, overexposed, static, blurred details, subtitles, style, works, paintings, images, static, overall gray, worst quality, low quality, JPEG compression residue, ugly, incomplete, extra fingers, poorly drawn hands, poorly drawn faces, deformed, disfigured, misshapen limbs, fused fingers, still picture, messy background, three legs, many people in the background, walking backwards"
    default_width: 832
    default_height: 480
    num_frames: 81
    num_inference_steps: 50
    fps: 16
    enable_cfg: true
    cfg_guidance_scale: 5.0
    seed: 42
    output_dir: ./output_infer/wan2_1_t2v_1_3b_lora
    infer_every_iters: ${training.save_every_iters}

logging:
    rank_zero_only: true
    train_log_every_iters: 10
    infer_log_every_steps: 10

resume:
    auto_resume: false
