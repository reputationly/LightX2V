model:
    name: qwen_image_edit
    pretrained_model_name_or_path: /path/to/Qwen/Qwen-Image-Edit-2511
    max_sequence_length: 1024
    running_dtype: bf16

distributed:
    backend: nccl
    timeout_minutes: 60
    fsdp2:
        enabled: true
        reshard_after_forward:
            root_reshard: false
            block_reshard: true
        mixed_precision:
            param_dtype: bf16
            reduce_dtype: fp32
            output_dtype: null
            cast_forward_inputs: false

data:
    train:
        name: image_dataset
        num_workers: 4
        prompt_dropout_rate: 0.05
        target_area: 1048576 # 1024 * 1024
        shuffle: true
        data_path:
            # https://github.com/ModelTC/LightX2V_train_data_examples/blob/main/dataset_edit/train.jsonl
            - /path/to/LightX2V_train_data_examples/dataset_edit/train.jsonl
    val:
        name: image_dataset
        num_workers: 2
        target_area: 1048576 # 1024 * 1024
        shuffle: false
        data_path:
            # https://github.com/ModelTC/LightX2V_train_data_examples/blob/main/dataset_edit/val.jsonl
            - /path/to/LightX2V_train_data_examples/dataset_edit/val.jsonl

scheduler:
    num_train_timesteps: 1000
    timestep_distribution: logitnormal
    logitnormal_mean: 0.0
    logitnormal_std: 1.0
    min_t: 0.001
    max_t: 1.0
    time_shift_settings:
        do_time_shift: true
        shift_type: exponential
        time_shift_power: 1.0
        dynamic_shift: true
        patch_size: [2, 2]  # [H, W]
        shift_x1: 256
        shift_x2: 4096
        shift_y1: 0.5
        shift_y2: 1.15

training:
    method: flow
    train_type: lora
    max_train_iters: 1000
    gradient_accumulation_iters: 1
    gradient_checkpointing: true
    max_grad_norm: 1.0
    lr_scheduler: constant
    lr_warmup_iters: 10
    save_every_iters: 100
    save_total_limit: 10
    lora:
        rank: 16
        alpha: 16
        target_modules:
            - to_k
            - to_q
            - to_v
            - to_out.0
    optimizer:
        learning_rate: 0.0001
        adam_beta1: 0.9
        adam_beta2: 0.999
        weight_decay: 0.01
        adam_epsilon: 0.00000001
    output_dir: ./output_train/qwen_image_edit_2511_lora

inference:
    method: image_infer
    negative_prompt: " "
    default_width: 1024
    default_height: 1024
    num_inference_steps: 40
    enable_cfg: true
    cfg_guidance_scale: 4.0
    seed: 42
    output_dir: ./output_infer/qwen_image_edit_2511_lora
    infer_every_iters: ${training.save_every_iters}

logging:
    rank_zero_only: true
    train_log_every_iters: 10
    infer_log_every_steps: 10

resume:
    auto_resume: true
