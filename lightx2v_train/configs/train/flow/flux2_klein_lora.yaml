model:
    name: flux2_klein
    pretrained_model_name_or_path: /path/to/FLUX.2-Klein-9B
    max_sequence_length: 512
    text_encoder_out_layers: [9, 18, 27]
    running_dtype: bf16

data:
    train:
        name: image_dataset
        num_workers: 8
        prompt_dropout_rate: 0.1
        target_area: 1048576 # 1024 * 1024
        shuffle: true
        # examples: https://github.com/ModelTC/LightX2V_train_data_examples
        data_path:
            - /path/to/LightX2V_train_data_examples/dataset_v1/train.jsonl
    val:
        name: image_dataset
        num_workers: 8
        shuffle: false
        data_path:
            - /path/to/LightX2V_train_data_examples/dataset_v1/val.jsonl

scheduler:
    num_train_timesteps: 1000
    timestep_distribution: logitnormal
    logitnormal_mean: 0.0
    logitnormal_std: 1.0
    min_t: 0.001
    max_t: 1.0
    time_shift_settings:
        do_time_shift: true
        shift_type: exponential
        time_shift_power: 1.0
        dynamic_shift: true
        shift_mu_strategy: flux2_empirical
        shift_mu_num_steps: 50
        # Flux2 latents are already 2x2-patchified before scheduler shift length calculation.
        patch_size: [1, 1] # [H, W]

training:
    method: flow
    train_type: lora
    max_train_iters: 3000
    gradient_accumulation_iters: 1
    gradient_checkpointing: true
    max_grad_norm: 1.0
    lr_scheduler: constant
    lr_warmup_iters: 10
    save_every_iters: 100
    save_total_limit: 10
    lora:
        rank: 16
        alpha: 16
        target_modules:
            - to_q
            - to_k
            - to_v
            - to_out.0
            - add_q_proj
            - add_k_proj
            - add_v_proj
            - to_add_out
            - to_qkv_mlp_proj
    optimizer:
        learning_rate: 0.0001
        adam_beta1: 0.9
        adam_beta2: 0.999
        weight_decay: 0.01
        adam_epsilon: 0.00000001
    output_dir: ./output_train/flux2_klein_lora

inference:
    method: image_infer
    negative_prompt: ""
    default_width: 1024
    default_height: 1024
    num_inference_steps: 50
    enable_cfg: true
    cfg_guidance_scale: 4.0
    seed: 42
    output_dir: ./output_infer/flux2_klein_lora
    infer_every_iters: ${training.save_every_iters}

logging:
    rank_zero_only: true
    train_log_every_iters: 10
    infer_log_every_steps: 10

resume:
    auto_resume: true
