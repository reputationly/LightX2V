name: Sync Upstream

# 每日从 ModelTC/LightX2V 同步代码到 fork
on:
  schedule:
    - cron: "17 18 * * *"   # 每天 UTC 18:17 (北京时间 02:17)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream/main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/ModelTC/LightX2V.git || true
          git fetch upstream
          # 合并上游 main（保留我们新增的 ARM Dockerfile + workflow）
          git merge upstream/main --no-edit -m "chore: sync upstream $(date -u +%Y-%m-%d)" || {
            echo "合并冲突，需人工处理"
            git merge --abort
            exit 1
          }
          git push origin main

  # 同步后自动触发 ARM 镜像重建
  trigger-rebuild:
    needs: sync
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ARM64 build
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-arm64-docker.yml',
              ref: 'main'
            });
