name: Build ARM64 Docker Image

# 构建 ARM64 + CUDA 12.8 镜像并推送 Docker Hub
# 触发：手动 / Dockerfile 变更 / 上游同步后
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "镜像 tag 后缀"
        default: "arm64-cu128"
  push:
    branches: [main]
    paths:
      - "dockerfiles/Dockerfile_aarch64_cu128"
      - ".github/workflows/build-arm64-docker.yml"

jobs:
  build-arm64:
    # GitHub 原生 ARM64 runner（公开仓库免费）。CUDA kernel 用 NVCC 交叉编译，构建期不需要 GPU
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 300
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfiles/Dockerfile_aarch64_cu128
          platforms: linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lightx2v:${{ github.event.inputs.tag || 'arm64-cu128' }}
            ${{ secrets.DOCKERHUB_USERNAME }}/lightx2v:arm64-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
